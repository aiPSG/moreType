<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>moreType — grid type construction kit</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Boot watchdog: if the app bundle fails to start (cached 404, stale
      // asset, script error before React mounts), retry the bundle once with
      // a cache-busting URL, and otherwise show the actual error instead of a
      // white page. Runs before any module code, so it can't be taken down by
      // whatever breaks the bundle.
      (function () {
        var errs = [];
        window.addEventListener("error", function (e) {
          errs.push(
            (e.message || "script error") +
              (e.filename ? "\n  at " + e.filename + ":" + (e.lineno || 0) : ""),
          );
        });
        window.addEventListener("unhandledrejection", function (e) {
          var r = e.reason;
          errs.push("promise: " + (r && r.message ? r.message : String(r)));
        });
        function esc(s) {
          return String(s).replace(/</g, "&lt;");
        }
        function paint(msg) {
          var el = document.createElement("div");
          el.style.cssText =
            "font-family:system-ui,sans-serif;max-width:720px;margin:10vh auto;padding:0 24px;color:#111";
          el.innerHTML =
            "<h2 style='margin:0 0 8px'>moreType failed to start</h2>" +
            "<p style='color:#555'>" + msg + "</p>" +
            (errs.length
              ? "<pre style='background:#f5f5f5;border:1px solid #ddd;padding:10px;white-space:pre-wrap;font-size:12px'>" +
                esc(errs.join("\n")) + "</pre>"
              : "") +
            "<pre style='color:#888;font-size:11px;white-space:pre-wrap'>" +
            esc(navigator.userAgent) + "</pre>" +
            "<button onclick='location.reload()' style='padding:8px 14px;cursor:pointer'>Reload</button>";
          document.body.appendChild(el);
        }
        setTimeout(function () {
          var root = document.getElementById("root");
          if (window.__MT_BOOTED || (root && root.childElementCount > 0)) return;
          var dyn;
          try {
            // Indirection avoids a parse error in browsers without import().
            dyn = new Function("u", "return import(u)");
          } catch (_) {
            paint("This browser does not support JavaScript modules.");
            return;
          }
          // Right after a deploy the GitHub Pages edge can briefly fail to
          // serve the freshly-published bundle (propagation lag), so a single
          // retry often isn't enough. Retry a handful of times with backoff so
          // the window self-heals silently instead of showing the error page.
          var MAX = 6;
          function booted() {
            var el = document.getElementById("root");
            return window.__MT_BOOTED || (el && el.childElementCount > 0);
          }
          function attempt(n) {
            if (booted()) return;
            dyn("./assets/index.js?boot=" + Date.now() + "." + n)
              .then(function () {
                setTimeout(function () {
                  if (booted()) return;
                  if (n < MAX) attempt(n + 1);
                  else paint("The app bundle loaded but did not start.");
                }, 1200);
              })
              .catch(function (err) {
                if (n < MAX) {
                  setTimeout(function () {
                    attempt(n + 1);
                  }, Math.min(3000, 600 * n));
                } else {
                  errs.push(
                    "bundle retry failed after " +
                      MAX +
                      " tries: " +
                      (err && err.message ? err.message : String(err)),
                  );
                  paint(
                    "The app bundle could not be loaded — usually a network problem or a stale cached file.",
                  );
                }
              });
          }
          attempt(1);
        }, 2500);
      })();

      // CSS watchdog: the stylesheet is injected as a plain <link> with no
      // cache-busting query, so a stale or cached-404 copy leaves the app
      // rendered but completely unstyled (raw HTML). The JS watchdog above
      // can't heal this — the built bundle no longer imports the CSS (Vite
      // extracts it to the <link>). If our sentinel custom property (--ink)
      // isn't applied shortly after load, re-inject the stylesheet with a
      // cache-busting URL so a fresh copy is fetched.
      (function () {
        function styled() {
          return (
            getComputedStyle(document.documentElement)
              .getPropertyValue("--ink")
              .trim() !== ""
          );
        }
        function heal(tries) {
          if (styled()) return;
          if (tries <= 0) {
            var link = document.createElement("link");
            link.rel = "stylesheet";
            link.href = "./assets/index.css?boot=" + Date.now();
            document.head.appendChild(link);
            return;
          }
          setTimeout(function () {
            heal(tries - 1);
          }, 300);
        }
        window.addEventListener("load", function () {
          heal(3);
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

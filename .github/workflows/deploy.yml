name: Deploy to GitHub Pages

on:
  # Deploy whenever the site changes on these branches.
  push:
    branches:
      - main
      - claude/grid-type-construction-kit-bcw20x
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Permissions required by actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent Pages deployment; let in-progress ones finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Pages
        # enablement: true turns on GitHub Pages (source = GitHub Actions)
        # the first time this runs, so no manual repo setting is needed.
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - run: npm ci

      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
